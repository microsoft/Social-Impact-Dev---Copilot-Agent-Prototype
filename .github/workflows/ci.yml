name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Run code quality checks and tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
            python-version-file: .python-version

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff format check
        uses: astral-sh/ruff-action@v1
        with:
          args: format --check .

      - name: Ruff lint
        uses: astral-sh/ruff-action@v1
        with:
          args: check .

      - name: Ty type check
        run: uv run ty check .

      - name: Pytest
        run: uv run pytest
